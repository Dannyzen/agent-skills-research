services:
  # Single LLM backend (Ollama) for CPU efficiency
  llm:
    image: ollama/ollama:latest
    container_name: sovereign-llm
    environment:
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "11434:11434"
    volumes:
      - clawd_ollama_data:/root/.ollama

  # Utility to pull the models on startup
  model-puller:
    image: curlimages/curl
    depends_on:
      - llm
    command: >
      sh -c "
      echo 'Waiting for Ollama...';
      until curl -s http://llm:11434/api/tags > /dev/null; do sleep 2; done;
      echo 'Checking llama3...';
      # (Always trying to pull just in case, Ollama handles existing models quickly)
      curl -X POST http://llm:11434/api/pull -d '{\"name\": \"llama3\"}';
      echo 'Checking nomic-embed-text...';
      curl -X POST http://llm:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}';
      echo 'Models ready!';
      "

volumes:
  clawd_ollama_data:
    external: true
