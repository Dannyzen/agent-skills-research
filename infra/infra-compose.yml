version: "3.8"

services:
  # Qdrant - High-performance Vector Database for Agent Memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sovereign-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /var/lib/qdrant_storage:/qdrant/storage
    restart: always
